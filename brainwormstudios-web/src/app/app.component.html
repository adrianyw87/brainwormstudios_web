@if (lightboxState.open && lightboxState.src) {
<div class="fj-lightbox" (click)="closeLightbox()" role="dialog" aria-modal="true" aria-label="Imagen ampliada">
  <img class="fj-lightbox__img" [src]="lightboxState.src" alt="" (click)="$event.stopPropagation()">
  <button type="button" class="fj-lightbox__close" (click)="closeLightbox(); $event.stopPropagation()"
    aria-label="Cerrar">×</button>
</div>
}
<main class="ct" id="t1">
  <div class="ct" id="t2">
    <div class="ct" id="t3">
      <div class="ct" id="t4">
        <app-nav-bar [currentLang]="currentLang" (languageChange)="onLanguageChange($event)"
          [onEstudioNavClick]="resetEstudioView">
        </app-nav-bar>

        <div class="page" id="p1">
          <app-estudio-section [view]="estudioView" [animationTrigger]="estudioAnimationKey"
            (explorarClick)="goToEstudioDetalle()" (volverClick)="resetEstudioView()">
          </app-estudio-section>
        </div>

        <div class="page" id="p2">
          <app-freejefry-section></app-freejefry-section>
        </div>

        <div class="page" id="p3">
          <app-desarrollo-section></app-desarrollo-section>
        </div>

        <!-- Sección Merchan comentada - volveremos más adelante -->
        <!-- <div class="page" id="p4">
          <app-merchan-section></app-merchan-section>
        </div>
        <div class="page" id="p5">
          <app-contacto-section></app-contacto-section>
        </div> -->

        <div class="page" id="p4">
          <app-contacto-section></app-contacto-section>
        </div>
      </div>
    </div>
  </div>
</main>
