<div class="svc-flip-card" [class.svc-flip-card--flipped]="isFlipped" (click)="toggleFlip()">
  <div class="svc-flip-card__inner">
    <div class="svc-flip-card__front">
      <span class="svc-flip-card__label">{{ frontKey | translate }}</span>
      <span class="svc-flip-card__hint">{{ 'CREW_SABER_MAS' | translate }}</span>
    </div>
    <div class="svc-flip-card__back">
      <p class="svc-flip-card__text">{{ backKey | translate }}</p>
    </div>
  </div>
</div>
