@if (href) {
<a [href]="href" class="bws-btn bws-btn-fos1" (click)="onClick()">
  <svg aria-hidden="true">
    <rect x="0" y="0" fill="none" width="100%" height="100%" rx="10" ry="10" />
  </svg>
  <ng-content></ng-content>
</a>
} @else {
<button [type]="type" class="bws-btn bws-btn-fos1" (click)="onClick()">
  <svg aria-hidden="true">
    <rect x="0" y="0" fill="none" width="100%" height="100%" rx="10" ry="10" />
  </svg>
  <ng-content></ng-content>
</button>
}
