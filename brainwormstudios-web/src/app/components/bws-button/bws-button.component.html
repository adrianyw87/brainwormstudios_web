@if (href) {
<a [href]="href" class="bws-btn bws-btn-fos1" [class.bws-btn-yellow]="variant === 'yellow'"
  [class.bws-btn-card]="variant === 'card'" [class.bws-btn-detail]="variant === 'detail'" (click)="onClick()">
  <svg aria-hidden="true">
    <rect x="0" y="0" fill="none" width="100%" height="100%" rx="10" ry="10" />
  </svg>
  <span class="bws-btn-text">{{ label }}</span>
</a>
} @else {
<button [type]="type" class="bws-btn bws-btn-fos1" [class.bws-btn-yellow]="variant === 'yellow'"
  [class.bws-btn-card]="variant === 'card'" [class.bws-btn-detail]="variant === 'detail'" (click)="onClick()">
  <svg aria-hidden="true">
    <rect x="0" y="0" fill="none" width="100%" height="100%" rx="10" ry="10" />
  </svg>
  <span class="bws-btn-text">
    <ng-content></ng-content>
  </span>
</button>
}
